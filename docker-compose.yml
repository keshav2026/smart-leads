version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: smartleads
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://admin:secret@mongo:27017/smartleads?authSource=admin
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    networks:
      - smart-leads-net
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    restart: unless-stopped
    env_file: ./frontend/.env
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - smart-leads-net
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:

networks:
  smart-leads-net:
    driver: bridge
